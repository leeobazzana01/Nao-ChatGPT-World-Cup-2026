#nginx.conf, reverse proxy for the NAO API that enables gzip, generous timeouts for Whisper/GPT, and rate limiting

upstream nao_api {
    server nao-api:8080;
    keepalive 32;
}

#per ip rate limiting
limit_req_zone $binary_remote_addr zone=nao_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    #meximum upload size (images)
    client_max_body_size 30M;

    #timeouts for Whisper + GPT 
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;

    #gzip compreension, text responses only
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 256;

    #proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;

    #main nao endpoint
    location /speech/ {
        limit_req zone=nao_limit burst=10 nodelay;
        proxy_pass http://nao_api;
    }

    #dashboard and status
    location / {
        proxy_pass http://nao_api;
    }

    #health with no rate limiting
    location /health {
        proxy_pass http://nao_api;
        access_log off;
    }
}
